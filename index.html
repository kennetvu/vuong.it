<!DOCTYPE html>
<html lang="en">
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My custom Bulma website</title>
<link rel="stylesheet" href="./style.scss">

<body>
  <section class="hero is-light is-medium">
    <div class="hero-body has-text-centered">
      <div class="container">
        <h1 class="title is-size-1">
          Hey, I'm Kennet
        </h1>
        <h2 class="subtitle">
          Software developer with passion for tech
        </h2>
      </div>
    </div>
  </section>

  <div class="container is-widescreen">
    <nav class="level is-mobile">
      <div class="level-item has-text-centered">
        <div class="contact-tile uppercase" data-tooltip="kennet@vuong.it">
          <p class="heading">Email</p>
          <p class="title">
            <span class="icon">
              <i class="fas fa-envelope"></i>
            </span>
          </p>
        </div>
      </div>
      <div class="level-item has-text-centered">
        <a href="https://twitter.com/kennetvuong" target="_blank" class="contact-tile">
          <p class="heading">Twitter</p>
          <p class="title">
            <span class="icon">
              <i class="fab fa-twitter"></i>
            </span>
          </p>
        </a>
      </div>
      <div class="level-item has-text-centered">
        <a href="https://github.com/kennetvu" target="_blank" class="contact-tile">
          <p class="heading">Github</p>
          <p class="title">
            <span class="icon">
              <i class="fab fa-github"></i>
            </span></p>
        </a>
      </div>
      <div class="level-item has-text-centered">
        <a href="https://www.linkedin.com/in/kennet-vuong-a2a65849" target="_blank" class="contact-tile">
          <p class="heading">Linkedin</p>
          <p class="title">
            <span class="icon">
              <i class="fab fa-linkedin-in"></i>
            </span></p>
        </a>
      </div>
    </nav>
  </div>
  <footer class="footer">
    <div class="content has-text-centered">
      <p>
        Made with <strong>Bulma ♥️</strong><br />
        &copy; 2020 - vuong.it
      </p>
    </div>
  </footer>

  <script src="./index.js"></script>
</body>

</html>
